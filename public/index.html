<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paylink Ventures - M-Pesa Payment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .business-name {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .till-number {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .till-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]::placeholder,
        input[type="number"]::placeholder {
            color: #999;
        }

        .input-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .pay-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .pay-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .pay-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .pay-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loading {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }

        .security-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #f0f0f0;
            border-radius: 6px;
            font-size: 11px;
        }

        .security-badge::before {
            content: "🔒 ";
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .business-name {
                font-size: 20px;
            }

            .pay-button {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💳</div>
            <div class="business-name">Paylink Ventures</div>
            <div class="till-number">
                <div class="till-badge">Till: 8696250</div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing your payment...</p>
        </div>

        <div class="message" id="message"></div>

        <form id="paymentForm">
            <div class="form-group">
                <label for="phoneNumber">Phone Number *</label>
                <input
                    type="text"
                    id="phoneNumber"
                    name="phoneNumber"
                    placeholder="Enter your M-Pesa phone number"
                    required
                    autocomplete="tel"
                >
                <div class="input-hint">Format: 0712345678 or 254712345678</div>
            </div>

            <div class="form-group">
                <label for="amount">Amount (KES) *</label>
                <input
                    type="number"
                    id="amount"
                    name="amount"
                    placeholder="Enter amount"
                    min="1"
                    step="1"
                    required
                    autocomplete="off"
                >
                <div class="input-hint">Minimum: KES 1</div>
            </div>

            <button type="submit" class="pay-button" id="payButton">Pay Now</button>
        </form>

        <div class="footer">
            <p>Secure payment powered by M-Pesa</p>
            <div class="security-badge">Encrypted connection</div>
        </div>
    </div>

    <script>
        const form = document.getElementById('paymentForm');
        const phoneInput = document.getElementById('phoneNumber');
        const amountInput = document.getElementById('amount');
        const payButton = document.getElementById('payButton');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');

        // Show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
            messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // Clear message
        function clearMessage() {
            messageDiv.className = 'message';
            messageDiv.textContent = '';
        }

        // Show loading state
        function setLoading(isLoading) {
            if (isLoading) {
                loadingDiv.classList.add('show');
                payButton.disabled = true;
            } else {
                loadingDiv.classList.remove('show');
                payButton.disabled = false;
            }
        }

        // Validate phone number format
        function validatePhone(phone) {
            const cleaned = phone.replace(/[\s\-]/g, '');
            
            // Accept formats: 254XXXXXXXXX, +254XXXXXXXXX, 07XXXXXXXXX, or 2547XXXXXXXXX
            if (cleaned.startsWith('254') && cleaned.length === 12) {
                return /^254[17]\d{8}$/.test(cleaned);
            } else if (cleaned.startsWith('+254') && cleaned.length === 13) {
                return /^\+254[17]\d{8}$/.test(cleaned);
            } else if (cleaned.startsWith('0') && cleaned.length === 10) {
                return /^0[17]\d{8}$/.test(cleaned);
            }
            return false;
        }

        // Validate amount
        function validateAmount(amount) {
            const num = parseFloat(amount);
            return !isNaN(num) && num > 0 && Number.isInteger(num);
        }

        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessage();

            const phone = phoneInput.value.trim();
            const amount = amountInput.value.trim();

            // Validate inputs
            if (!phone) {
                showMessage('Please enter your phone number', 'error');
                phoneInput.focus();
                return;
            }

            if (!validatePhone(phone)) {
                showMessage('Invalid phone number format. Use 0712345678 or 254712345678', 'error');
                phoneInput.focus();
                return;
            }

            if (!amount) {
                showMessage('Please enter an amount', 'error');
                amountInput.focus();
                return;
            }

            if (!validateAmount(amount)) {
                showMessage('Amount must be a positive whole number', 'error');
                amountInput.focus();
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/stk-push', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        phoneNumber: phone,
                        amount: parseInt(amount)
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showMessage(
                        '✓ STK Push sent! Check your phone for the M-Pesa prompt. Your phone will vibrate when the prompt appears.',
                        'success'
                    );
                    form.reset();
                    phoneInput.focus();
                } else {
                    showMessage(
                        data.message || 'Payment initiation failed. Please try again.',
                        'error'
                    );
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage(
                    'Network error. Please check your connection and try again.',
                    'error'
                );
            } finally {
                setLoading(false);
            }
        });

        // Clear error message when user starts typing
        phoneInput.addEventListener('input', clearMessage);
        amountInput.addEventListener('input', clearMessage);

        // Auto-format phone number
        phoneInput.addEventListener('blur', function() {
            let value = this.value.replace(/[\s\-]/g, '');
            if (value && !value.startsWith('+') && !value.startsWith('254')) {
                if (value.startsWith('0')) {
                    // Convert 07... to 254...
                    this.value = '254' + value.substring(1);
                }
            }
        });

        // Focus phone input on load
        window.addEventListener('load', () => {
            phoneInput.focus();
        });
    </script>
</body>
</html>
